<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABR VALUES | Home</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">SABR VALUES</div>
        <div class="nav-links">
            <span class="nav-item active">Values</span>
            <span class="nav-item">Trade Calculator</span>
            <span class="nav-item">FAQ</span>
        </div>
    </nav>

    <div class="main-container">
        <h1 class="main-title">Central Database</h1>
        <p class="subtitle">CSS and structure linked successfully. Ready for data injection.</p>
    </div>

    <script>
        const body = document.body;
        const maxParticles = 15;
        const particles = [];

        window.addEventListener('mousemove', (e) => {
            const particle = document.createElement('div');
            particle.className = 'cursor-particle';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            
            body.appendChild(particle);
            particles.push(particle);

            setTimeout(() => {
                particle.style.transform = 'translate(-50%, -50%) scale(0)';
                particle.style.opacity = '0';
            }, 50);

            if (particles.length > maxParticles) {
                const oldParticle = particles.shift();
                oldParticle.remove();
            }
        });
    </script>
</body>
</html>
