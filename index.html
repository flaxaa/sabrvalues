<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABR Values</title>
    <link rel="stylesheet" href="style.css?v=1.5">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SABR VALUES</div>
        <div class="nav-links">
            <a onclick="showPage('home-page')" class="nav-item">HOME</a>
            <a onclick="showPage('values-page')" class="nav-item">VALUES</a>
        </div>
    </nav>

    <div id="home-page" class="page-section active-page">
        <div class="hero-container">
            <h1 class="main-title">Brainrot Values</h1>
            <button class="cta-button" onclick="showPage('values-page')">Click here to see VALUES</button>
        </div>
    </div>

    <div id="values-page" class="page-section" style="display: none;">
        <div class="main-container">
            <h1 class="main-title">Brainrot Catalog</h1>
            <p class="subtitle">Click any unit below to inspect its historical data profile, market demand, and legacy status.</p>
            
            <div id="directory-grid" class="directory-grid">
                <div class="loading-text">Loading secure database...</div>
            </div>
        </div>
    </div>

    <div id="item-detail-page" class="page-section" style="display: none;">
        <div class="main-container">
            <button onclick="goBackToGrid()" class="cta-button" style="padding: 10px 25px; font-size: 1rem; margin-bottom: 30px; background: #222; border-color: #444;">← Back to Catalog</button>
            
            <div id="dynamic-item-profile"></div>
        </div>
    </div>

    <script src="/sabrvalues/script.js?v=1.5"></script>
</body>
</html>
